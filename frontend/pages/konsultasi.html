<div class="form-section">
    <h2>Tambah Konsultasi Baru</h2>
    <form id="form-konsultasi">
        <div class="form-row">
            <div class="form-group">
                <label for="patient_id">Pasien *</label>
                <select id="patient_id" name="patient_id" required>
                    <option value="">-- Pilih Pasien --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="doctor_id">Dokter *</label>
                <select id="doctor_id" name="doctor_id" required>
                    <option value="">-- Pilih Dokter --</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="complaint">Keluhan *</label>
            <textarea id="complaint" name="complaint" required></textarea>
        </div>
        <div class="form-group">
            <label for="consultation_result">Hasil Konsultasi *</label>
            <textarea id="consultation_result" name="consultation_result" required></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="consultation_date">Tanggal Konsultasi *</label>
                <input type="date" id="consultation_date" name="consultation_date" required>
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="done">Selesai</option>
                    <option value="pending">Menunggu</option>
                    <option value="cancelled">Dibatalkan</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn-submit">Tambah Konsultasi</button>
    </form>
</div>

<div class="table-section">
    <h2>Daftar Konsultasi</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Pasien ID</th>
                <th>Dokter ID</th>
                <th>Keluhan</th>
                <th>Tanggal</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="konsultasi-tbody">
            <tr><td colspan="7" class="empty-message">Loading...</td></tr>
        </tbody>
    </table>
</div>
