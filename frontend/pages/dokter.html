<div class="form-section">
    <h2>Tambah Dokter Baru</h2>
    <form id="form-dokter">
        <div class="form-row">
            <div class="form-group">
                <label for="full_name">Nama Lengkap *</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            <div class="form-group">
                <label for="specialization">Spesialisasi *</label>
                <input type="text" id="specialization" name="specialization" placeholder="Misal: Kardiolog, Dokter Umum, etc." required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="phone">Nomor Telepon</label>
                <input type="text" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
        </div>
        <button type="submit" class="btn-submit">Tambah Dokter</button>
    </form>
</div>

<div class="table-section">
    <h2>Daftar Dokter</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Spesialisasi</th>
                <th>Telepon</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="dokter-tbody">
            <tr><td colspan="5" class="empty-message">Loading...</td></tr>
        </tbody>
    </table>
</div>
