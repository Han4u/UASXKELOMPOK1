<div class="form-section">
    <h2>Tambah Pasien Baru</h2>
    <form id="form-pasien">
        <div class="form-row">
            <div class="form-group">
                <label for="full_name">Nama Lengkap *</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            <div class="form-group">
                <label for="gender">Jenis Kelamin *</label>
                <select id="gender" name="gender" required>
                    <option value="">-- Pilih --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="date_of_birth">Tanggal Lahir *</label>
                <input type="date" id="date_of_birth" name="date_of_birth" required>
            </div>
            <div class="form-group">
                <label for="phone">Nomor Telepon</label>
                <input type="text" id="phone" name="phone">
            </div>
        </div>
        <div class="form-group">
            <label for="address">Alamat</label>
            <textarea id="address" name="address" style="min-height: 80px;"></textarea>
        </div>
        <button type="submit" class="btn-submit">Tambah Pasien</button>
    </form>
</div>

<div class="table-section">
    <h2>Daftar Pasien</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Jenis Kelamin</th>
                <th>Tanggal Lahir</th>
                <th>Telepon</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="pasien-tbody">
            <tr><td colspan="6" class="empty-message">Loading...</td></tr>
        </tbody>
    </table>
</div>
